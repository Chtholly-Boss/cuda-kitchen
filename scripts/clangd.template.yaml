CompileFlags:
  Add:
    - -I__REPO_ROOT__/thirdparty/cutlass/include/
    - -I__REPO_ROOT__/thirdparty/cuda/include/
    - "-ferror-limit=0"
Hover:
  ShowAKA: No
InlayHints:
  TypeNameLimit: 24

Diagnostics:
  Suppress:
    - "variadic_device_fn"
    - "attributes_not_allowed"
---
If:
  PathMatch: [.*\.cu, .*\.cuh]
CompileFlags:
  Add:
    - --cuda-path=__CUDA_PATH__
    - -I__CUDA_INCLUDE__
    - -I__CUDA_CCCL_INCLUDE__
    - --cuda-gpu-arch=__CUDA_GPU_ARCH__
    - "-xcuda"
    - --std=c++20
    - "-D__INTELLISENSE__"
    - "-D__CLANGD__"
    - "-D__CUDA_FEATURE_TAG__"
    - "-DCUTLASS_ARCH_MMA_SM__CUDA_ARCH_SM___SUPPORTED=1"
    - "-D_LIBCUDACXX_STD_VER=20"
    - "-D__CUDACC_VER_MAJOR__=__CUDA_MAJOR__"
    - "-D__CUDACC_VER_MINOR__=__CUDA_MINOR__"
    - "-D__CUDA_ARCH__=__CUDA_ARCH_VAL__"
    - "-D__CUDA_ARCH_FEAT_SM__CUDA_ARCH_SM___ALL"
    - "-Wno-invalid-constexpr"
  Remove:
    - "-Xcudafe"
    - "--diag_suppress*"
    - "-Xcompiler=-fPIC"
    - "-Xfatbin*"
    - "-gencode*"
    - "--generate-code*"
    - "-ccbin*"
    - "--compiler-options*"
    - "--expt-extended-lambda"
    - "--expt-relaxed-constexpr"
    - "-forward-unknown-to-host-compiler"
    - "-Werror=cross-execution-space-call"
